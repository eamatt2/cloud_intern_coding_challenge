services:

  certgen:
    image: alpine/openssl
    volumes:
      - ./nginx/certs:/certs
    command:  req -x509 -newkey rsa:2048 -keyout /certs/server.key -out /certs/server.crt -days 365 -nodes -subj "/CN=localhost/O=CloudChallenge/C=US" -addext "subjectAltName=DNS:localhost,IP:127.0.0.1" 

  app:
    build:
      context: ./app
      dockerfile: dockerfile
    restart: unless-stopped
    environment:
      PORT: "5000"
    expose:
      - "5000"
    depends_on:
      certgen:
        condition: service_completed_successfully
  
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      certgen:
        condition: service_completed_successfully
      app:
        condition: service_started
